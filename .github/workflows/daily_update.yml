name: Daily World Cup Update

# Runs automatically every day during the tournament, and can also be
# triggered manually from the Actions tab.
on:
  schedule:
    # 06:00 UTC daily. Adjust to taste -- e.g. run a few times a day
    # during matchdays by adding more cron entries.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

# -----------------------------------------------------------------
# IMPORTANT: this workflow pushes refreshed data/processed/ files
# back to main after every run. That requires explicit write
# permission on `contents` -- GitHub's default for the Actions
# token is read-only on repos created after early 2023, which is
# why the job was failing in ~23 seconds (fast install + update,
# then rejected push).
# -----------------------------------------------------------------
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch with the token so the subsequent push is
          # authenticated -- without this, git push uses the
          # default unauthenticated remote and also fails.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python main.py update

      - name: Commit refreshed predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          # Only commit if something actually changed (e.g. new
          # results came in since yesterday's run). Exit 0 either way.
          if git diff --staged --quiet; then
            echo "No changes to data/processed/ -- nothing to commit."
          else
            git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
            git push
            echo "Pushed refreshed predictions."
          fi
