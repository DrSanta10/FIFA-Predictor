name: Daily World Cup Update

# Runs automatically every day during the tournament, and can also be
# triggered manually from the Actions tab.
on:
  schedule:
    # 06:00 UTC daily. Adjust to taste -- e.g. run a few times a day
    # during matchdays by adding more cron entries.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python main.py update

      - name: Commit refreshed predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
          git push
